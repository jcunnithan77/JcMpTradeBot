services:
  tradebot-mp:
    build:
      context: .
      dockerfile: Dockerfile
    image: tradebot-market-profile:latest
    container_name: tradebot-market-profile
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - APP_ENV=production
      - TZ=Asia/Kolkata
    networks:
      - tradebot-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  tradebot-net:
    driver: bridge
